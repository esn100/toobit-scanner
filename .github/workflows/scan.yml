name: Toobit Scanner

on:
  schedule:
    # Twice a day: 00:00 UTC and 12:00 UTC
    - cron: "0 0,12 * * *"
  workflow_dispatch:  # manual trigger from the Actions tab

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd src
          python scanner.py

      - name: Render dashboard
        run: |
          cd src
          python dashboard.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: toobit-scanner-output
          path: |
            src/data/last_scan.json
            src/dashboard.html
            src/reports/
            src/data/signal_history.csv
            src/models/
