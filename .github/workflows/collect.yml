name: Live Data Collector

on:
  schedule:
    # Every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 9
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore previous data
        uses: actions/cache@v4
        with:
          path: data/feature_log.csv
          key: live-collector-feature-log
      - name: Restore outcomes
        uses: actions/cache@v4
        with:
          path: data/outcome_log.csv
          key: live-collector-outcome-log

      - name: Run one collection cycle
        run: |
          python -m src.live_collector --once

      - name: Commit data
        run: |
          git config user.email "toobit-scanner@arena.local"
          git config user.name "Toobit Scanner"
          git add -A data/
          if git diff --cached --quiet; then
            echo "no new data to commit"
          else
            git commit -m "data: collector snapshot $(date -u +%Y-%m-%dT%H:%M:%S)"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
