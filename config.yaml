# =============================================================================
# PumpHunter-AI: Master Configuration
# =============================================================================

scanner:
  exchange: toobit
  market_type: usdt_perp
  min_market_cap_usd: 0
  max_market_cap_usd: 20_000_000
  quote_currency: USDT
  max_symbols_per_run: 30
  min_24h_volume_usd: 1_000_000
  timeframe: 4h
  candles_limit: 300

schedule:
  run_times_utc: ["00:00", "12:00"]

# BTC market regime filter
btc_filter:
  enabled: true
  cache_minutes: 60

# Duplicate signal guard / cooldown
cooldown:
  hours: 6.0
  state_path: data/cooldown.json

# Alerting thresholds
alerting:
  notify_threshold: 75.0
  max_alerts_per_run: 5

# Data sources
data_sources:
  toobit:
    enabled: true
    base_url: https://api.toobit.com
  lunarcrush:
    enabled: true
    free_tier: true
  google_trends:
    enabled: true
    lookback_days: 7
  tradingview:
    enabled: true
    scrape: true
  coingecko:
    enabled: true
  arkham:
    enabled: false
  nansen:
    enabled: false
  cryptoquant:
    enabled: false
  coinglass:
    enabled: true
  telegram:
    enabled: true

# Rule-based scoring weights (backtest-optimised on 90 days / 20 symbols)
# Total = 100. The grid-search found these to maximise top-10% precision.
rule_weights:
  technical: 9.9
  momentum: 9.9
  volume: 14.8
  vwap: 4.9
  atr_bb: 12.3
  structure: 18.5
  candle: 14.8
  mtf: 4.9
  pattern: 9.9

# ML auto-tuning
ml:
  enabled: true
  min_history_to_train: 30
  retrain_every_n_runs: 1
  model_path: models/logreg_model.joblib
  history_path: data/signal_history.csv
  evaluate_previous: true

# Backward-compat with old ml_weights-based code
weights:
  technical: 40
  pattern: 20
  social: 25
  whale: 15

# Telegram
telegram:
  bot_token_env: TELEGRAM_BOT_TOKEN
  chat_id_env: TELEGRAM_CHAT_ID
  parse_mode: HTML
