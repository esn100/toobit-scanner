# =============================================================================
# Toobit Scanner - Master Configuration
# =============================================================================

scanner:
  exchange: toobit
  market_type: usdt_perp  # perpetual futures on Toobit
  min_market_cap_usd: 0        # we filter by Toobit 24h volume + market cap proxy
  max_market_cap_usd: 20_000_000
  quote_currency: USDT
  max_symbols_per_run: 50      # cap to control runtime
  min_24h_volume_usd: 1_000_000

  timeframe: 4h
  candles_limit: 300           # ~50 days of 4h candles

schedule:
  run_times_utc: ["00:00", "12:00"]  # twice a day

# Alerting thresholds
alerting:
  notify_threshold: 85.0       # only notify if score > 85
  max_alerts_per_run: 5

# Data sources - all free by default
data_sources:
  toobit:
    enabled: true
    base_url: https://api.toobit.com
  lunarcrush:
    enabled: true
    free_tier: true
  google_trends:
    enabled: true
    lookback_days: 7
  tradingview:
    enabled: true
    scrape: true
  coingecko:
    enabled: true                 # used for market cap & metadata
  arkham:
    enabled: false                # needs API key
  nansen:
    enabled: false                # needs API key
  cryptoquant:
    enabled: false                # needs API key
  coinglass:
    enabled: true                 # free tier for liquidations
  telegram:
    enabled: true

# Initial scoring weights (will be tuned by ML)
# Total = 100. These are the *prior* weights used until ML has data.
weights:
  technical: 40
  pattern: 20
  social: 25
  whale: 15

# ML auto-tuning
ml:
  enabled: true
  min_history_to_train: 20       # need 20 labeled runs before training
  retrain_every_n_runs: 5
  model_path: models/weight_model.joblib
  history_path: data/signal_history.csv
  # We learn a mapping from features -> optimal weights via a
  # simple reinforcement-style update. Initial weights come from config.

# Telegram - set as GitHub Secrets
telegram:
  bot_token_env: TELEGRAM_BOT_TOKEN
  chat_id_env: TELEGRAM_CHAT_ID
  parse_mode: HTML
